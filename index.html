<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLMs, RL, and Reasoning - Interactive Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            text-align: center;
            color: #111827;
            margin-bottom: 30px;
        }
        .question-card {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .question-text {
            font-size: 1.15em;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .options {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        .option {
            background-color: #e5e7eb;
            margin-bottom: 10px;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        .option:hover {
            background-color: #d1d5db;
        }
        .option.correct {
            background-color: #dcfce7;
            border-color: #22c55e;
            color: #166534;
        }
        .option.incorrect {
            background-color: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }
        .option.disabled {
            pointer-events: none;
        }
        .explanation {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background-color: #eff6ff;
            border-left: 4px solid #3b82f6;
            border-radius: 0 6px 6px 0;
            color: #1e3a8a;
            font-size: 0.95em;
        }
        .explanation strong {
            display: block;
            margin-bottom: 5px;
            color: #1d4ed8;
        }
    </style>
</head>
<body>

    <h1>LLMs, RL, and Reasoning Quiz</h1>
    <div id="quiz-container"></div>

    <script>
        const quizData = [
            {
                question: "1. What is the fundamental mechanism of an LLM during the pre-training step?",
                options: [
                    "Filtering out non-sense data automatically",
                    "Predicting the previous token in a sequence",
                    "Predicting the next token in an auto-regressive way",
                    "Summarizing entire text paragraphs simultaneously"
                ],
                correctAnswer: 2,
                explanation: "Abstractly, LLMs model conditional probabilities to predict the next token in an auto-regressive way based on supervised learning over massive text data."
            },
            {
                question: "2. Which of the following is considered a primary limitation of simply pre-training an LLM?",
                options: [
                    "They cannot generate any text without human intervention",
                    "They are inherently bad at reasoning tasks and require careful prompt engineering",
                    "They memorize text exactly and cannot create novel sentences",
                    "They operate too slowly to be used in real-time applications"
                ],
                correctAnswer: 1,
                explanation: "The lecture highlights that base pre-trained LLMs need carefully written prompts to trigger desired predictions and struggle with reasoning tasks, even simple ones."
            },
            {
                question: "3. What are the two key components of Alpaca's training pipeline?",
                options: [
                    "A strong pre-trained model + high-quality instruction-following data",
                    "A small neural network + massive amounts of unlabelled data",
                    "Tree of Thought search + human preference voting",
                    "Retrieval Augmented Generation + custom tokenizers"
                ],
                correctAnswer: 0,
                explanation: "Alpaca utilizes a strong pre-trained model (like GPT-3.5) combined with high-quality instruction-following data to improve capabilities."
            },
            {
                question: "4. What is the main idea behind the 'Tree of Thought & RL' approach?",
                options: [
                    "Mapping out sentence structures into syntax trees",
                    "Generating different possible outputs and learning a score/reward for each thought",
                    "Grouping similar words into a tree-like database",
                    "Storing past conversations in a hierarchical file system"
                ],
                correctAnswer: 1,
                explanation: "It involves using LLMs to generate various possible outputs (thoughts) and then learning a score or 'reward' to adjust the output probability of each thought (e.g., in Creative Writing or Game 24)."
            },
            {
                question: "5. What does RAG stand for in the context of LLM inference?",
                options: [
                    "Recurrent Attention Generation",
                    "Reasoning Algorithmic Graphs",
                    "Retrieval Augmented Generation",
                    "Reinforcement AI Guidance"
                ],
                correctAnswer: 2,
                explanation: "RAG stands for Retrieval Augmented Generation, which supplements existing LLMs with fresh, retrieved data at inference time."
            },
            {
                question: "6. Which of the following is a core challenge of implementing RAG?",
                options: [
                    "Preventing the LLM from speaking in different languages",
                    "Building efficient data index/retrieval systems and attributing answers to correct references",
                    "Training the model on billions of new parameters daily",
                    "Converting text into audio format"
                ],
                correctAnswer: 1,
                explanation: "The lecture explicitly lists building efficient data index/retrieval systems, ensuring answer accuracy, and attributing to the correct reference as core challenges for RAG."
            },
            {
                question: "7. In the context of the lecture, what is another common term used for 'In-context Learning'?",
                options: [
                    "Zero-shot or one-shot learning",
                    "Fine-tuning",
                    "Unsupervised pre-training",
                    "Backpropagation"
                ],
                correctAnswer: 0,
                explanation: "In-context learning is also called 0-shot or 1-shot learning, meaning the model learns with a single sample (or no samples) provided directly in the prompt."
            },
            {
                question: "8. How does the lecture fundamentally describe In-context Learning?",
                options: [
                    "It is essentially clever prompt engineering",
                    "It is a new hardware architecture for GPUs",
                    "It is a way to permanently alter the model's weights",
                    "It is a method to reduce the model's energy consumption"
                ],
                correctAnswer: 0,
                explanation: "The presentation explicitly states that In-context learning is 'essentially clever prompt engineering'."
            },
            {
                question: "9. When is Retrieval Augmented Generation (RAG) particularly useful?",
                options: [
                    "When the LLM needs to draw images",
                    "When you want to train an LLM from scratch",
                    "When your LLM's training data did not contain information about the specific query",
                    "When you want to reduce the context window size"
                ],
                correctAnswer: 2,
                explanation: "RAG is highly useful when the base model lacks knowledge about recent events or specific queries, as it pulls in fresh external data."
            },
            {
                question: "10. Based on the lecture's Q&A math example (e.g., Q: 1+2 A: -1), does an LLM truly learn the underlying reasoning task?",
                options: [
                    "Yes, it permanently understands mathematical rules after one example",
                    "No, it cannot do math under any circumstances",
                    "It depends; it often just relies on the specific patterns demonstrated in the prompt",
                    "Yes, but only if the math involves calculus"
                ],
                correctAnswer: 2,
                explanation: "The lecture poses 'Does LLMs Truly Learn the Task? It depends…' showcasing how providing arbitrary examples changes the LLM's output based on pattern matching rather than true, rigid mathematical reasoning."
            }
        ];

        const quizContainer = document.getElementById('quiz-container');

        quizData.forEach((item, index) => {
            // Create Card
            const card = document.createElement('div');
            card.className = 'question-card';

            // Create Question
            const questionText = document.createElement('div');
            questionText.className = 'question-text';
            questionText.innerText = item.question;
            card.appendChild(questionText);

            // Create Options List
            const optionsList = document.createElement('ul');
            optionsList.className = 'options';

            // Create Explanation Box
            const explanationBox = document.createElement('div');
            explanationBox.className = 'explanation';
            explanationBox.innerHTML = `<strong>Explanation:</strong> ${item.explanation}`;

            item.options.forEach((optText, optIndex) => {
                const optionItem = document.createElement('li');
                optionItem.className = 'option';
                optionItem.innerText = optText;

                optionItem.addEventListener('click', function() {
                    // Disable all options in this question once clicked
                    const allOptions = optionsList.querySelectorAll('.option');
                    allOptions.forEach(opt => opt.classList.add('disabled'));

                    // Check if correct
                    if (optIndex === item.correctAnswer) {
                        this.classList.add('correct');
                    } else {
                        this.classList.add('incorrect');
                        // Highlight the correct answer as well
                        allOptions[item.correctAnswer].classList.add('correct');
                    }

                    // Show explanation
                    explanationBox.style.display = 'block';
                });

                optionsList.appendChild(optionItem);
            });

            card.appendChild(optionsList);
            card.appendChild(explanationBox);
            quizContainer.appendChild(card);
        });
    </script>
</body>
</html>
